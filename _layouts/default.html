<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo">
        MirageLAB
        <span>오늘의 공부</span>
      </a>
      <nav>
        <a href="{{ '/' | relative_url }}">TEPS</a>
        <a href="{{ '/quiz/' | relative_url }}">퀴즈</a>
        <a href="{{ '/notes/' | relative_url }}">노트</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="main-layout">
      {% include sidebar.html %}
      <div class="content-area">
        {{ content }}
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© {{ site.time | date: '%Y' }} {{ site.author.name }} &nbsp;·&nbsp; MirageLAB</p>
    </div>
  </footer>
</body>
</html>
