title: MirageLAB
description: "공부 기록 블로그 — TEPS 자동 포스트 & 수동 학습 노트"
url: "https://ghkdlxm005.github.io"
baseurl: "/MirageLAB"

author:
  name: Mirage

lang: ko

# Build settings
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Permalink
permalink: /:categories/:year/:month/:day/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - teps_generator.py
  - "*.sh"
  - vendor/

# Collections
collections:
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: notes
    values:
      layout: page

