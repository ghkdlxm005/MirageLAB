name: Daily TEPS Post Generator

on:
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  generate-teps-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install groq

      - name: Generate TEPS post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python teps_generator.py

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          # 새 파일이 있을 때만 커밋
          git diff --cached --quiet || git commit -m "chore: auto TEPS post $(date +'%Y-%m-%d' -d '+9 hours')"
          git push
